<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Dasar Desain Figma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- App Container -->
    <div id="app" class="max-w-2xl mx-auto py-10 px-4">
        
        <!-- Login Screen -->
        <div id="login-screen" class="bg-white rounded-2xl shadow-xl p-8 text-center">
            <div class="mb-6">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=397&h=224" 
                     alt="Laptop Coding" 
                     class="mx-auto rounded-lg shadow-md mb-4 border border-gray-200"
                     width="397" height="224">
                <h1 class="text-3xl font-bold text-gray-800">Ujian Teori Figma</h1>
                <p class="text-gray-500 mt-2">Masukkan nama Anda untuk memulai kuis</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Nama Lengkap" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <button onclick="startQuiz()" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition duration-200">
                    Mulai Ujian
                </button>
            </div>
        </div>

        <!-- Quiz Screen (Hidden by default) -->
        <div id="quiz-screen" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-bold text-gray-800" id="display-name">Halo, User</h2>
                    <p class="text-sm text-gray-500">Progress: <span id="current-pos">1</span>/15</p>
                </div>
                <div class="text-right">
                    <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-sm font-semibold">Skor: <span id="live-score">0</span></span>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <div id="question-container">
                    <h3 id="question-text" class="text-lg font-semibold text-gray-800 mb-6">Memuat pertanyaan...</h3>
                    <div id="options-container" class="space-y-3">
                        <!-- Options go here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Result Screen (Hidden by default) -->
        <div id="result-screen" class="hidden bg-white rounded-2xl shadow-xl p-8 text-center">
            <div id="result-icon" class="text-6xl mb-4">🏆</div>
            <h1 class="text-3xl font-bold text-gray-800">Hasil Ujian</h1>
            <p id="result-message" class="text-gray-600 mt-2 mb-6">Selamat!</p>
            <div class="bg-gray-100 rounded-xl p-6 mb-6">
                <p class="text-sm text-gray-500 uppercase tracking-wide">Skor Akhir</p>
                <div class="text-6xl font-black text-indigo-600" id="final-score">0</div>
            </div>
            <button onclick="restartQuiz()" 
                    class="bg-gray-800 hover:bg-black text-white font-semibold px-8 py-3 rounded-lg transition">
                Coba Lagi
            </button>
        </div>

        <!-- Notification Modal (For Logic Rule) -->
        <div id="alert-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center px-4 z-50">
            <div class="bg-white p-8 rounded-xl max-w-sm w-full text-center">
                <div class="text-red-500 text-5xl mb-4">⚠️</div>
                <h3 class="text-xl font-bold mb-2">Gagal Melanjutkan!</h3>
                <p id="alert-text" class="text-gray-600 mb-6">Skor Anda di bawah 85 pada soal ke-12. Anda harus mengulang dari awal.</p>
                <button onclick="handleAlertRestart()" class="w-full bg-red-500 text-white py-2 rounded-lg font-bold">Ulangi Kuis</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "Cara membuat Frame di Figma adalah dengan…", a: ["Ctrl + V", "Tekan tombol F", "Klik kanan lalu delete", "Tekan tombol Alt", "Drag biasa"], correct: 1 },
            { q: "Width dalam desain berarti…", a: ["Tinggi objek", "Lebar objek", "Warna objek", "Transparansi", "Bayangan"], correct: 1 },
            { q: "Height (High) digunakan untuk…", a: ["Mengatur warna", "Mengatur tinggi objek", "Mengatur lebar", "Mengatur teks", "Mengatur opacity"], correct: 1 },
            { q: "Fungsi Fill adalah…", a: ["Mengatur posisi", "Memberi warna/isi objek", "Mengatur ukuran", "Menghapus objek", "Mengatur garis"], correct: 1 },
            { q: "Gradient Fill digunakan untuk…", a: ["Warna tunggal", "Menghapus warna", "Memberi efek gradasi warna", "Mengatur teks", "Mengatur layer"], correct: 2 },
            { q: "Padding adalah…", a: ["Jarak antar kolom", "Jarak luar objek", "Jarak dalam antara konten dan batas objek", "Ukuran teks", "Warna objek"], correct: 2 },
            { q: "Line Height berfungsi untuk…", a: ["Mengatur jarak antar huruf", "Mengatur jarak antar baris teks", "Mengatur warna teks", "Mengatur ukuran frame", "Mengatur margin"], correct: 1 },
            { q: "Grid (column & rows) berfungsi untuk…", a: ["Menghapus objek", "Mengatur animasi", "Menyusun layout agar rapi dan konsisten", "Mengatur warna", "Mengatur font"], correct: 2 },
            { q: "Gutter adalah…", a: ["Jarak antar baris", "Jarak antar kolom", "Tinggi objek", "Lebar objek", "Margin luar"], correct: 1 },
            { q: "Tipe Stretch pada grid berarti…", a: ["Grid di tengah otomatis", "Grid mengikuti ukuran objek", "Grid melebar mengikuti frame dan margin bisa diatur", "Grid hanya di atas", "Grid tidak berubah"], correct: 2 },
            { q: "Tipe Center pada column grid berarti…", a: ["Grid berada di tengah dengan margin otomatis", "Grid di kiri", "Grid di atas", "Grid mengikuti konten", "Grid tidak bisa diubah"], correct: 0 },
            { q: "Tipe Top pada grid digunakan untuk…", a: ["Mengatur kolom di tengah", "Mengatur grid dimulai dari atas (rows)", "Mengatur warna", "Mengatur teks", "Mengatur frame"], correct: 1 },
            { q: "Nudge Amount berfungsi untuk…", a: ["Mengubah warna objek", "Mengatur ukuran font", "Mengatur jarak perpindahan objek saat ditekan tombol panah", "Menghapus layer", "Mengatur grid"], correct: 2 },
            { q: "Shortcut untuk memindahkan objek sedikit demi sedikit menggunakan keyboard adalah…", a: ["Tombol Enter", "Tombol Shift", "Tombol panah (Arrow keys)", "Tombol Ctrl", "Tombol Tab"], correct: 2 },
            { q: "Perbedaan padding dan margin adalah…", a: ["Padding di luar, margin di dalam", "Padding dan margin sama", "Padding di dalam objek, margin di luar objek", "Padding hanya untuk teks", "Margin hanya untuk warna"], correct: 2 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let userName = "";

        function startQuiz() {
            const nameInput = document.getElementById('username').value;
            if (nameInput.trim() === "") {
                alert("Silakan masukkan nama Anda!");
                return;
            }
            userName = nameInput;
            document.getElementById('display-name').innerText = `Halo, ${userName}`;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = quizData[currentQuestion];
            document.getElementById('current-pos').innerText = currentQuestion + 1;
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            
            q.a.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 border-2 border-gray-100 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition duration-150 flex items-center";
                btn.innerHTML = `
                    <span class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-lg mr-3 text-sm font-bold text-gray-500">${String.fromCharCode(65 + index)}</span>
                    <span class="text-gray-700">${option}</span>
                `;
                btn.onclick = () => selectOption(index);
                container.appendChild(btn);
            });
        }

        function selectOption(index) {
            if (index === quizData[currentQuestion].correct) {
                score++;
                document.getElementById('live-score').innerText = Math.round((score / quizData.length) * 100);
            }

            // Logic check on Question 12 (Index 11)
            if (currentQuestion === 11) {
                let currentPercentage = (score / 12) * 100;
                if (currentPercentage < 85) {
                    showFailureAlert();
                    return;
                }
            }

            currentQuestion++;

            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showFailureAlert() {
            document.getElementById('alert-modal').classList.remove('hidden');
        }

        function handleAlertRestart() {
            document.getElementById('alert-modal').classList.add('hidden');
            restartQuiz();
        }

        function showResults() {
            const finalScore = Math.round((score / quizData.length) * 100);
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = finalScore;
            
            if(finalScore >= 80) {
                document.getElementById('result-message').innerText = `Hebat, ${userName}! Kamu menguasai materi Figma.`;
                document.getElementById('result-icon').innerText = "🏆";
            } else {
                document.getElementById('result-message').innerText = `Terima kasih, ${userName}. Belajar lagi ya!`;
                document.getElementById('result-icon').innerText = "📚";
            }
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('live-score').innerText = "0";
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('username').value = "";
        }
    </script>
</body>
</html>
